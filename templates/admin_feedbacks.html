<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title data-ar="ملاحظات المستخدمين" data-en="User Feedback">ملاحظات المستخدمين</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="admin-page">

  <button type="button" id="langSwitch" class="lang-switch admin-lang">EN</button>

  <h1 data-ar="ملاحظات المستخدمين" data-en="User Feedback">
    ملاحظات المستخدمين
  </h1>

  <table class="feedback-table">
    <tr>
      <th data-ar="التاريخ" data-en="Date">التاريخ</th>
      <th data-ar="التقييم" data-en="Rating">التقييم</th>
      <th data-ar="الحالة" data-en="Status">الحالة</th>
      <th data-ar="الملاحظات" data-en="Notes">الملاحظات</th>
    </tr>

    {% for item in feedbacks %}
    <tr>
      <td>{{ item["Date"] }}</td>
      <td>
        {{ item["Rating"] }}
        <span data-ar="نجوم" data-en="Stars">نجوم</span>
      </td>
      <td>{{ item["Satisfaction"] }}</td>
      <td>{{ item["Notes"] }}</td>
    </tr>
    {% endfor %}
  </table>
</div>

<script>
const langSwitch = document.getElementById("langSwitch");

function setLang(lang) {
  localStorage.setItem("lang", lang);

  document.title = lang === "en" ? "User Feedback" : "ملاحظات المستخدمين";

  if (lang === "en") {
    document.documentElement.lang = "en";
    document.documentElement.dir = "ltr";
    if (langSwitch) langSwitch.textContent = "AR";
  } else {
    document.documentElement.lang = "ar";
    document.documentElement.dir = "rtl";
    if (langSwitch) langSwitch.textContent = "EN";
  }

  document.querySelectorAll("[data-ar]").forEach(el => {
    el.textContent = lang === "en" ? el.dataset.en : el.dataset.ar;
  });
}

if (langSwitch) {
  langSwitch.addEventListener("click", function () {
    const current = localStorage.getItem("lang") || "ar";
    setLang(current === "ar" ? "en" : "ar");
  });
}

setLang(localStorage.getItem("lang") || "ar");
</script>

</body>
</html>
